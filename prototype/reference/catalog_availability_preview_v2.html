<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atlas — Regional Availability Map v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light;
        --bg: oklch(0.975 0.003 240);
        --surface: oklch(0.995 0.002 240);
        --border: oklch(0.905 0.008 240);
        --border-strong: oklch(0.82 0.012 240);
        --text: oklch(0.18 0.015 240);
        --text-muted: oklch(0.42 0.015 240);
        --text-soft: oklch(0.58 0.01 240);

        --accent: oklch(0.45 0.14 175);
        --accent-soft: oklch(0.94 0.03 175);
        --accent-hover: oklch(0.38 0.12 175);

        --available: oklch(0.52 0.14 155);
        --available-bg: oklch(0.955 0.035 155);
        --available-border: oklch(0.88 0.06 155);
        --planned: oklch(0.50 0.12 280);
        --planned-bg: oklch(0.955 0.025 280);
        --planned-border: oklch(0.88 0.05 280);
        --interim: oklch(0.58 0.15 70);
        --interim-bg: oklch(0.96 0.04 70);
        --interim-border: oklch(0.88 0.07 70);
        --not-planned: oklch(0.62 0.01 240);
        --not-planned-bg: oklch(0.96 0.003 240);
        --not-planned-border: oklch(0.90 0.005 240);

        --radius: 8px;
        --radius-lg: 12px;
        --shadow: 0 2px 8px oklch(0.3 0.02 240 / 0.06);
        --shadow-lg: 0 8px 32px oklch(0.3 0.02 240 / 0.08);
        --transition: 0.16s cubic-bezier(0.22, 1, 0.36, 1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .shell {
        display: grid;
        grid-template-columns: 200px 1fr;
        min-height: 100dvh;
      }

      /* Sidebar */
      .sidebar {
        position: sticky;
        top: 0;
        height: 100dvh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .brand { display: flex; align-items: center; gap: 8px; padding: 4px 8px; }

      .brand-mark {
        width: 22px; height: 22px;
        background: var(--accent);
        border-radius: 6px;
      }

      .brand-name { font-weight: 700; font-size: 14px; letter-spacing: -0.02em; }

      .nav { display: flex; flex-direction: column; gap: 1px; }
      .nav-label { padding: 4px 8px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-soft); margin-bottom: 2px; }

      .nav-link {
        padding: 6px 8px;
        border-radius: 5px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        cursor: pointer;
        transition: var(--transition);
      }

      .nav-link:hover { background: var(--bg); color: var(--text); }
      .nav-link.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

      /* Main */
      .main { min-width: 0; display: flex; flex-direction: column; }

      .topbar {
        position: sticky; top: 0; z-index: 40;
        height: 48px;
        background: oklch(0.975 0.003 240 / 0.88);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center;
        padding: 0 24px; gap: 10px;
      }

      .search-field {
        flex: 1; max-width: 380px;
        display: flex; align-items: center; gap: 6px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 6px; padding: 0 10px; height: 32px;
        transition: var(--transition);
      }

      .search-field:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px oklch(0.45 0.14 175 / 0.1); }
      .search-field svg { color: var(--text-soft); flex-shrink: 0; width: 14px; height: 14px; }
      .search-field input { flex: 1; border: 0; outline: 0; background: transparent; font: inherit; font-size: 13px; color: var(--text); }

      .topbar-end { margin-left: auto; display: flex; gap: 6px; align-items: center; }
      .pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; background: var(--bg); border: 1px solid var(--border); color: var(--text-soft); }

      /* Content */
      .content { max-width: 1200px; margin: 0 auto; padding: 24px; width: 100%; }

      .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 3px; }
      .page-desc { font-size: 13px; color: var(--text-muted); max-width: 56ch; margin-bottom: 20px; }

      /* Region Strip */
      .region-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }

      .region-cell {
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        transition: var(--transition);
      }

      .region-cell:hover { border-color: var(--border-strong); }
      .region-cell.active { border-color: var(--accent); background: var(--accent-soft); }

      .region-cell .name { font-size: 12px; font-weight: 700; letter-spacing: -0.01em; }
      .region-cell .meta { font-size: 10px; color: var(--text-soft); margin-bottom: 6px; }
      .region-cell .counts { display: flex; gap: 8px; font-size: 10px; font-weight: 600; }
      .region-cell .c-avail { color: var(--available); }
      .region-cell .c-plan { color: var(--planned); }

      /* Controls */
      .controls {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 16px; flex-wrap: wrap;
      }

      .ctrl-select {
        height: 28px; padding: 0 8px;
        border: 1px solid var(--border); border-radius: 999px;
        background: var(--surface); font: inherit;
        font-size: 12px; font-weight: 500; color: var(--text-muted);
        cursor: pointer; outline: 0; transition: var(--transition);
        -webkit-appearance: none; appearance: none;
      }

      .ctrl-select:hover { border-color: var(--border-strong); }
      .ctrl-select:focus { border-color: var(--accent); }

      .ctrl-spacer { flex: 1; }

      .ctrl-meta { font-size: 11px; color: var(--text-soft); }

      .view-switch {
        display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden;
      }

      .view-switch button {
        padding: 4px 10px; border: 0; background: var(--surface);
        font: inherit; font-size: 11px; font-weight: 600;
        color: var(--text-soft); cursor: pointer; transition: var(--transition);
      }

      .view-switch button:not(:last-child) { border-right: 1px solid var(--border); }
      .view-switch button.active { background: var(--accent-soft); color: var(--accent); }
      .view-switch button:hover:not(.active) { background: var(--bg); }

      /* Domain Sections */
      .domain-section { margin-bottom: 24px; }

      .domain-bar {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 8px;
        position: sticky; top: 48px; z-index: 10;
        background: var(--bg); padding: 4px 0;
      }

      .domain-bar h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
      .domain-bar .n { font-size: 10px; font-weight: 700; color: var(--text-soft); background: var(--border); padding: 0 5px; border-radius: 999px; }
      .domain-bar .line { flex: 1; height: 1px; background: var(--border); }

      /* Card Grid */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 8px;
      }

      .svc-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        cursor: pointer;
        transition: var(--transition);
        display: flex; flex-direction: column; gap: 8px;
      }

      .svc-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow); }
      .svc-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px oklch(0.45 0.14 175 / 0.08); }

      .svc-top { display: flex; align-items: center; gap: 10px; }

      .svc-icon {
        width: 30px; height: 30px;
        background: var(--bg); border: 1px solid var(--border);
        border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; font-weight: 800; color: var(--accent);
        flex-shrink: 0;
      }

      .svc-title { font-size: 13px; font-weight: 600; line-height: 1.2; }

      .svc-chips { display: flex; gap: 4px; flex-wrap: wrap; }

      .chip {
        display: inline-flex; align-items: center; gap: 3px;
        font-size: 10px; font-weight: 600;
        padding: 2px 6px; border-radius: 3px;
        white-space: nowrap;
      }

      .chip .d { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
      .chip.available { background: var(--available-bg); color: var(--available); }
      .chip.planned { background: var(--planned-bg); color: var(--planned); }
      .chip.interim { background: var(--interim-bg); color: var(--interim); }
      .chip.not-planned { background: var(--not-planned-bg); color: var(--not-planned); }
      .chip.more { background: var(--bg); color: var(--text-soft); border: 1px solid var(--border); }

      /* Inline Expand Panel — appears right after clicked card */
      .expand-panel {
        grid-column: 1 / -1;
        background: var(--surface);
        border: 1.5px solid var(--accent);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: 0 0 0 3px oklch(0.45 0.14 175 / 0.05), var(--shadow-lg);
        animation: expandIn 0.2s cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes expandIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

      .expand-head {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }

      .expand-head .left { display: flex; align-items: center; gap: 10px; }
      .expand-head .icon { width: 34px; height: 34px; background: var(--accent-soft); border: 1px solid var(--border); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--accent); }
      .expand-head .title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
      .expand-head .domain { font-size: 11px; color: var(--text-soft); }

      .expand-close {
        width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 5px;
        background: var(--bg); display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1;
      }

      .expand-close:hover { background: var(--surface); color: var(--text); }

      .expand-body {
        display: grid; grid-template-columns: 1fr 1fr; gap: 0;
      }

      .expand-locs { padding: 14px 18px; border-right: 1px solid var(--border); }
      .expand-actions { padding: 14px 18px; }

      .sec-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); margin-bottom: 8px; }

      .loc-list { display: flex; flex-direction: column; gap: 4px; }

      .loc-item {
        display: flex; align-items: center; justify-content: space-between;
        padding: 7px 10px; background: var(--bg); border-radius: 5px; gap: 8px;
      }

      .loc-item .loc-label { font-size: 12px; font-weight: 600; }
      .loc-item .loc-sub { font-size: 10px; color: var(--text-soft); }

      .loc-item .loc-badge {
        display: flex; align-items: center; gap: 4px;
        font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px;
      }

      .loc-item .loc-badge .d { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
      .loc-item .loc-badge.available { background: var(--available-bg); color: var(--available); }
      .loc-item .loc-badge.planned { background: var(--planned-bg); color: var(--planned); }
      .loc-item .loc-badge.interim { background: var(--interim-bg); color: var(--interim); }
      .loc-item .loc-badge.not-planned { background: var(--not-planned-bg); color: var(--not-planned); }

      .guidance {
        margin-top: 10px; padding: 10px 12px;
        border-radius: 6px; font-size: 12px; line-height: 1.5;
      }

      .guidance.g-planned { background: var(--planned-bg); border: 1px solid var(--planned-border); }
      .guidance.g-available { background: var(--available-bg); border: 1px solid var(--available-border); }
      .guidance strong { display: block; margin-bottom: 2px; color: var(--text); font-size: 11px; }
      .guidance p { color: var(--text-muted); }

      .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

      .act-btn {
        padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px;
        background: var(--surface); font: inherit; font-size: 12px; font-weight: 600;
        color: var(--text); text-align: center; cursor: pointer; transition: var(--transition);
      }

      .act-btn:hover { background: var(--bg); border-color: var(--border-strong); }
      .act-btn.primary { background: var(--accent); border-color: var(--accent); color: oklch(0.98 0.005 175); }
      .act-btn.primary:hover { background: var(--accent-hover); }

      .act-fresh { margin-top: 10px; font-size: 10px; color: var(--text-soft); padding-top: 8px; border-top: 1px solid var(--border); }

      /* Compact Matrix View */
      .matrix-container { display: none; }
      .matrix-container.visible { display: block; }

      .mtx {
        width: 100%; border-collapse: separate; border-spacing: 0;
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
      }

      .mtx th, .mtx td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 12px; }
      .mtx th { background: var(--bg); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); position: sticky; top: 48px; z-index: 5; }
      .mtx tr:last-child td { border-bottom: 0; }
      .mtx tr[data-id]:hover td { background: oklch(0.97 0.006 175); }
      .mtx tr[data-id] { cursor: pointer; }
      .mtx .domain-divider td { background: var(--bg); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); padding: 8px 10px; }

      .mtx .svc-cell { display: flex; align-items: center; gap: 7px; min-width: 160px; }
      .mtx .svc-cell .ic { width: 20px; height: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 800; color: var(--accent); }
      .mtx .svc-cell .nm { font-weight: 600; }

      .mtx .st { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
      .mtx .st .d { width: 6px; height: 6px; border-radius: 50%; }
      .mtx .st.available { color: var(--available); }
      .mtx .st.available .d { background: var(--available); }
      .mtx .st.planned { color: var(--planned); }
      .mtx .st.planned .d { background: var(--planned); }
      .mtx .st.not-planned { color: var(--not-planned); opacity: 0.5; }
      .mtx .st.not-planned .d { background: var(--not-planned); }

      /* Empty */
      .empty { text-align: center; padding: 32px; color: var(--text-muted); }
      .empty h3 { font-size: 14px; color: var(--text); margin-bottom: 4px; }
      .empty button { margin-top: 8px; padding: 6px 12px; background: var(--accent); color: white; border: 0; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; }

      /* Responsive */
      @media (max-width: 1024px) {
        .shell { grid-template-columns: 1fr; }
        .sidebar { display: none; }
        .region-strip { grid-template-columns: repeat(3, 1fr); }
        .expand-body { grid-template-columns: 1fr; }
        .expand-locs { border-right: 0; border-bottom: 1px solid var(--border); }
      }

      @media (max-width: 640px) {
        .content { padding: 16px; }
        .card-grid { grid-template-columns: 1fr; }
        .region-strip { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"></div>
          <span class="brand-name">Atlas</span>
        </div>
        <nav class="nav">
          <div class="nav-label">Workspace</div>
          <div class="nav-link">Home</div>
          <div class="nav-link">Capabilities</div>
          <div class="nav-link active">Availability</div>
          <div class="nav-link">Sources</div>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="search-field">
            <svg viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <input id="searchInput" type="search" placeholder="Search services... S3, EKS, Bedrock" />
          </div>
          <div class="topbar-end">
            <span class="pill">Last synced: just now</span>
          </div>
        </header>

        <div class="content">
          <h1 class="page-title">Regional Availability Map</h1>
          <p class="page-desc">Locate services across STT regions and outposts. Click any service for detailed status and next steps.</p>

          <section class="region-strip" id="regionStrip"></section>

          <section class="controls">
            <select class="ctrl-select" id="statusFilter">
              <option value="all">All statuses</option>
              <option value="available">Available</option>
              <option value="planned">Planned</option>
              <option value="interim">Interim</option>
              <option value="not-planned">Not planned</option>
            </select>
            <select class="ctrl-select" id="domainFilter">
              <option value="all">All domains</option>
            </select>
            <div class="ctrl-spacer"></div>
            <span class="ctrl-meta" id="resultsMeta"></span>
            <div class="view-switch">
              <button id="btnCards" class="active">Cards</button>
              <button id="btnMatrix">Matrix</button>
            </div>
          </section>

          <div id="cardsContainer"></div>
          <div id="matrixContainer" class="matrix-container"></div>
        </div>
      </main>
    </div>

    <script>
      const locations = [
        { id: 'us-east-1', label: 'US-East-1', sub: 'North Virginia', type: 'region' },
        { id: 'ca-central-1', label: 'CA-Central-1', sub: 'Canada Central', type: 'region' },
        { id: 'gdc', label: 'GDC', sub: 'Primary Outpost', type: 'outpost' },
        { id: 'dc16', label: 'DC16', sub: 'DR Outpost', type: 'outpost' },
        { id: 'mt10', label: 'MT10', sub: 'Future DR', type: 'outpost' },
      ];

      function svc(id, name, domain, icon, avail) { return { id, name, domain, icon, avail }; }
      function av(note) { return { status: 'available', label: 'Available', note: note || '' }; }
      function pl(eta) { return { status: 'planned', label: 'Planned', note: eta }; }
      function it(note) { return { status: 'interim', label: 'Interim', note: note || '' }; }
      function np() { return { status: 'not-planned', label: 'Not planned', note: '' }; }

      const services = [
        svc('landing-zones', 'Landing Zones', 'Landing Zones', 'LZ', { 'us-east-1': av('L3-L5'), 'ca-central-1': av('L3-L5') }),
        svc('s3', 'S3', 'Storage', 'S3', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('efs', 'Elastic File System (EFS)', 'Storage', 'EFS', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('ebs', 'Elastic Block Storage (EBS)', 'Storage', 'EBS', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('backup', 'AWS Backup', 'Storage', 'BAK', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('ec2', 'EC2', 'Compute', 'EC2', { 'us-east-1': av(), 'ca-central-1': av(), gdc: pl('05/30/2026'), dc16: pl('07/31/2026'), mt10: pl('TBD') }),
        svc('lambda', 'Lambda', 'Compute', 'LAM', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('ecs-fargate', 'ECS Fargate', 'Containers', 'ECS', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('ecr', 'Elastic Container Registry', 'Containers', 'ECR', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('eks', 'Elastic Kubernetes Service (EKS)', 'Containers', 'EKS', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('ecs-ec2', 'ECS on EC2', 'Containers', 'EC2', { gdc: pl('06/30/2026'), dc16: pl('07/31/2026'), mt10: pl('TBD') }),
        svc('aurora', 'Aurora Serverless v2 (PostgreSQL)', 'Database', 'PG', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('elasticache', 'ElastiCache', 'Database', 'EC', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('kinesis', 'Kinesis', 'Analytics', 'KIN', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('glue', 'AWS Glue', 'Analytics', 'GLU', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('athena', 'Athena', 'Analytics', 'ATH', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('sqs', 'Simple Queue Service (SQS)', 'App Integration', 'SQS', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('sns', 'Simple Notification Service (SNS)', 'App Integration', 'SNS', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('eventbridge', 'EventBridge', 'App Integration', 'EVB', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('airflow', 'Managed Apache Airflow', 'App Integration', 'MWA', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('step-functions', 'Step Functions', 'App Integration', 'SFN', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('transfer', 'Transfer Family', 'Migration & Transfer', 'TRN', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('dms', 'Database Migration Service', 'Migration & Transfer', 'DMS', { 'us-east-1': pl('05/30/2026'), 'ca-central-1': pl('05/30/2026') }),
        svc('bedrock', 'Amazon Bedrock', 'AI Services', 'BDR', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('agentcore', 'Bedrock AgentCore', 'AI Services', 'AGC', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('textract', 'Amazon Textract', 'AI Services', 'TEX', { 'us-east-1': av(), 'ca-central-1': av() }),
        svc('elb', 'Elastic Load Balancing (ELB)', 'Networking', 'ELB', { gdc: pl('06/30/2026'), dc16: pl('06/30/2026'), mt10: pl('TBD') }),
      ];

      let state = { query: '', status: 'all', domain: 'all', loc: null, selected: null, view: 'cards' };

      function cell(s, locId) { return s.avail[locId] || np(); }
      function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

      function getFiltered() {
        return services.filter(s => {
          const q = state.query.toLowerCase();
          if (q && ![s.name, s.domain, s.icon].join(' ').toLowerCase().includes(q)) return false;
          if (state.domain !== 'all' && s.domain !== state.domain) return false;
          if (state.status !== 'all' && !locations.some(l => cell(s, l.id).status === state.status)) return false;
          if (state.loc && cell(s, state.loc).status === 'not-planned') return false;
          return true;
        });
      }

      function groupBy(arr, key) {
        const g = {};
        arr.forEach(i => (g[i[key]] ??= []).push(i));
        return g;
      }

      function chipHtml(status, text) {
        return `<span class="chip ${status}"><span class="d"></span>${esc(text)}</span>`;
      }

      function buildChips(s) {
        const active = locations.filter(l => cell(s, l.id).status !== 'not-planned');
        const chips = active.slice(0, 3).map(l => {
          const c = cell(s, l.id);
          const note = c.note && c.status === 'planned' ? ` ${c.note}` : '';
          return chipHtml(c.status, l.label + note);
        });
        if (active.length > 3) chips.push(`<span class="chip more">+${active.length - 3}</span>`);
        if (active.length === 0) chips.push(chipHtml('not-planned', 'No availability'));
        return chips.join('');
      }

      // Region Strip
      function renderRegions() {
        document.getElementById('regionStrip').innerHTML = locations.map(loc => {
          const avCount = services.filter(s => cell(s, loc.id).status === 'available').length;
          const plCount = services.filter(s => cell(s, loc.id).status === 'planned').length;
          const active = state.loc === loc.id;
          return `<div class="region-cell ${active ? 'active' : ''}" data-loc="${loc.id}">
            <div class="name">${esc(loc.label)}</div>
            <div class="meta">${esc(loc.sub)}</div>
            <div class="counts">
              ${avCount ? `<span class="c-avail">${avCount} avail</span>` : ''}
              ${plCount ? `<span class="c-plan">${plCount} planned</span>` : ''}
              ${!avCount && !plCount ? `<span style="color:var(--text-soft)">none yet</span>` : ''}
            </div>
          </div>`;
        }).join('');

        document.querySelectorAll('.region-cell').forEach(el => {
          el.addEventListener('click', () => {
            state.loc = state.loc === el.dataset.loc ? null : el.dataset.loc;
            state.selected = null;
            render();
          });
        });
      }

      function renderFilters() {
        const sel = document.getElementById('domainFilter');
        if (sel.options.length <= 1) {
          [...new Set(services.map(s => s.domain))].forEach(d => sel.add(new Option(d, d)));
        }
        sel.value = state.domain;
        document.getElementById('statusFilter').value = state.status;
      }

      // Cards View
      function renderCards() {
        const filtered = getFiltered();
        const meta = document.getElementById('resultsMeta');
        const locLabel = state.loc ? locations.find(l => l.id === state.loc)?.label : '';
        meta.textContent = `${filtered.length} service${filtered.length !== 1 ? 's' : ''}${locLabel ? ' in ' + locLabel : ''}`;

        if (!filtered.length) {
          document.getElementById('cardsContainer').innerHTML = `<div class="empty"><h3>No services match</h3><p>Broaden search or clear filters.</p><button onclick="resetAll()">Reset</button></div>`;
          return;
        }

        const groups = groupBy(filtered, 'domain');
        let html = '';

        for (const [domain, items] of Object.entries(groups)) {
          html += `<section class="domain-section">
            <div class="domain-bar"><h3>${esc(domain)}</h3><span class="n">${items.length}</span><div class="line"></div></div>
            <div class="card-grid">`;

          for (const s of items) {
            html += `<div class="svc-card ${state.selected === s.id ? 'selected' : ''}" data-id="${s.id}">
              <div class="svc-top">
                <div class="svc-icon">${esc(s.icon)}</div>
                <div class="svc-title">${esc(s.name)}</div>
              </div>
              <div class="svc-chips">${buildChips(s)}</div>
            </div>`;

            if (state.selected === s.id) {
              html += renderExpandPanel(s);
            }
          }

          html += `</div></section>`;
        }

        document.getElementById('cardsContainer').innerHTML = html;
        bindCards();
      }

      function renderExpandPanel(s) {
        const hasPlanned = locations.some(l => cell(s, l.id).status === 'planned');
        const activeLocs = locations.filter(l => cell(s, l.id).status !== 'not-planned');
        const allAvail = activeLocs.length > 0 && activeLocs.every(l => cell(s, l.id).status === 'available');

        let guidance = '';
        if (hasPlanned) {
          const etas = locations.map(l => cell(s, l.id)).filter(c => c.status === 'planned' && c.note && c.note !== 'TBD').map(c => c.note).sort();
          guidance = `<div class="guidance g-planned"><strong>Rollout in progress</strong><p>${etas.length ? 'Next expected: ' + esc(etas[0]) + '.' : 'Timeline TBD.'} Contact platform team for interim access.</p></div>`;
        } else if (allAvail) {
          guidance = `<div class="guidance g-available"><strong>Ready to use</strong><p>Proceed to service catalog or user guide to begin onboarding.</p></div>`;
        }

        return `<div class="expand-panel">
          <div class="expand-head">
            <div class="left">
              <div class="icon">${esc(s.icon)}</div>
              <div><div class="title">${esc(s.name)}</div><div class="domain">${esc(s.domain)}</div></div>
            </div>
            <button class="expand-close" data-close="1">&times;</button>
          </div>
          <div class="expand-body">
            <div class="expand-locs">
              <div class="sec-label">Availability by location</div>
              <div class="loc-list">
                ${locations.map(l => {
                  const c = cell(s, l.id);
                  const sub = c.status === 'planned' && c.note ? `ETA: ${c.note}` : l.sub;
                  return `<div class="loc-item">
                    <div><span class="loc-label">${esc(l.label)}</span> <span class="loc-sub">${esc(sub)}</span></div>
                    <span class="loc-badge ${c.status}"><span class="d"></span>${esc(c.label)}</span>
                  </div>`;
                }).join('')}
              </div>
              ${guidance}
            </div>
            <div class="expand-actions">
              <div class="sec-label">Next steps</div>
              <div class="action-grid">
                <button class="act-btn primary">Open Catalog</button>
                <button class="act-btn">User Guide</button>
                <button class="act-btn">Onboarding</button>
                <button class="act-btn">Support</button>
              </div>
              <div class="act-fresh">Source: catalog.md. Production surfaces show anchors, freshness, and warnings per cell.</div>
            </div>
          </div>
        </div>`;
      }

      function bindCards() {
        document.querySelectorAll('.svc-card').forEach(el => {
          el.addEventListener('click', () => {
            state.selected = state.selected === el.dataset.id ? null : el.dataset.id;
            renderCards();
            const panel = document.querySelector('.expand-panel');
            if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          });
        });

        document.querySelectorAll('.expand-close').forEach(el => {
          el.addEventListener('click', e => { e.stopPropagation(); state.selected = null; renderCards(); });
        });
      }

      // Matrix View
      function renderMatrix() {
        const filtered = getFiltered();
        if (!filtered.length) {
          document.getElementById('matrixContainer').innerHTML = `<div class="empty"><h3>No results</h3></div>`;
          return;
        }
        const groups = groupBy(filtered, 'domain');
        let rows = '';
        for (const [domain, items] of Object.entries(groups)) {
          rows += `<tr class="domain-divider"><td colspan="${locations.length + 1}">${esc(domain)}</td></tr>`;
          items.forEach(s => {
            rows += `<tr data-id="${s.id}"><td><div class="svc-cell"><span class="ic">${esc(s.icon)}</span><span class="nm">${esc(s.name)}</span></div></td>`;
            locations.forEach(l => {
              const c = cell(s, l.id);
              const note = c.status === 'planned' && c.note ? ` ${c.note}` : '';
              const text = c.status === 'not-planned' ? '\u2014' : c.label + note;
              rows += `<td><span class="st ${c.status}"><span class="d"></span>${esc(text)}</span></td>`;
            });
            rows += '</tr>';
          });
        }

        document.getElementById('matrixContainer').innerHTML = `<table class="mtx">
          <thead><tr><th>Service</th>${locations.map(l => `<th>${esc(l.label)}</th>`).join('')}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;

        document.querySelectorAll('.mtx tr[data-id]').forEach(row => {
          row.addEventListener('click', () => { state.selected = row.dataset.id; state.view = 'cards'; render(); });
        });
      }

      function resetAll() {
        state = { query: '', status: 'all', domain: 'all', loc: null, selected: null, view: state.view };
        document.getElementById('searchInput').value = '';
        render();
      }

      function render() {
        renderRegions();
        renderFilters();

        const cardsEl = document.getElementById('cardsContainer');
        const matrixEl = document.getElementById('matrixContainer');

        if (state.view === 'cards') {
          cardsEl.style.display = '';
          matrixEl.className = 'matrix-container';
          renderCards();
        } else {
          cardsEl.style.display = 'none';
          matrixEl.className = 'matrix-container visible';
          renderMatrix();
        }
      }

      document.getElementById('searchInput').addEventListener('input', e => { state.query = e.target.value; state.selected = null; render(); });
      document.getElementById('statusFilter').addEventListener('change', e => { state.status = e.target.value; state.selected = null; render(); });
      document.getElementById('domainFilter').addEventListener('change', e => { state.domain = e.target.value; state.selected = null; render(); });
      document.getElementById('btnCards').addEventListener('click', () => { state.view = 'cards'; document.getElementById('btnCards').classList.add('active'); document.getElementById('btnMatrix').classList.remove('active'); render(); });
      document.getElementById('btnMatrix').addEventListener('click', () => { state.view = 'matrix'; document.getElementById('btnMatrix').classList.add('active'); document.getElementById('btnCards').classList.remove('active'); render(); });

      render();
    </script>
  </body>
</html>

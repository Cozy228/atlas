# Atlas Resource projection records (plan 011, ADR-0013) — public-safe, fictional.
#
# Kind-first identity + Section Projection Plan ONLY: each Section binds an existing
# Source with an inline `heading` (a DEFAULT entry point, located at runtime by
# heading-slug scan) or a structured `selector`, plus an order — never Section
# content. Atlas stores no resolved excerpts; the agent-facing /api/resources surface
# live-resolves these references per request. Section ids are drawn from the
# resource-kind registry vocabulary for the record's `kind`.

# service kind — complete vocabulary demonstrated on the pilot service.
- kind: service
  slug: aws/textract
  provider: aws
  name: Amazon Textract
  aliases:
    - AWS Textract
    - Textract
    - Amazon Textract
  # Identity / presentation metadata absorbed onto the Resource (ADR-0015 §2,
  # plan 020 15a), copied off the `aws-textract` Topic. The Topic survives as a
  # facet label only; this record is the metadata home.
  category: ai-ml
  status: active
  description: Managed OCR service for document workflows.
  owner_team: cloud-platform
  support_channel: "#cloud-platform"
  entry_tools:
    - label: Terraform module
      url: https://tfe.example.com/app/example/registry/modules/private/example/textract/aws
    - label: User guide
      url: https://confluence.example.com/display/CLOUD/Textract+User+Guide
  topics:
    - aws-textract
  sections:
    # Private-connectivity prose from the approved Terraform module README. The
    # heading is a DEFAULT entry point, located at runtime by heading-slug scan.
    network:
      - source_id: textract-module-readme
        heading: Private subnet usage
        citation_label: Private subnet usage
        order: 10
    # Net-new wiring (plan 011 §3): the governed regional matrix, Textract row.
    # Located by structured selector (not a heading), so it carries `selector`.
    availability:
      - source_id: availability-matrix
        selector:
          service: Textract
        citation_label: Textract regional availability
        order: 10
    # The cited Terraform starter — a registered Source excerpt, never synthesized.
    examples:
      - source_id: textract-module-readme
        heading: Terraform starter
        citation_label: Terraform starter
        order: 10

# guardrail kind — a non-service kind, proving the framework is per-kind extensible.
- kind: guardrail
  slug: s3-public-access
  name: S3 Public Access Guardrail
  aliases:
    - S3 public access
    - block public access
    - bucket public access
    # The security-policy topic this guardrail answers to (plan 019): policies
    # resolve their governed resource by topic id through the alias mechanism.
    - s3-guardrails
  sections:
    enforced-controls:
      - source_id: s3-policy-doc
        heading: Public access controls
        citation_label: Public access controls
        order: 10
    # Deprecated allowance retained for migration — surfaces as available content
    # carrying a stale_source warning (the source is past its review window).
    exceptions:
      - source_id: legacy-s3-policy
        heading: Legacy public access
        citation_label: Legacy public access
        order: 10

# service kind — metadata-only overlays (plan 020 15a). These services already
# exist + resolve via the availability spine (governance "configured" once an
# overlay is present); the record's job here is to be the home for the identity
# metadata migrated off the catalog Topics. No governed Section bindings yet, so
# `sections` is empty and the content body renders honest-empty until evidence is
# registered — services are uniform (plan 019), no per-service special-casing.
- kind: service
  slug: aws/bedrock
  provider: aws
  name: Amazon Bedrock
  aliases:
    - AWS Bedrock
    - Bedrock
  category: ai-ml
  status: active
  description: Managed foundation model access for approved workloads.
  owner_team: cloud-platform
  support_channel: "#cloud-platform"
  entry_tools:
    - label: Module
      url: https://tfe.example.com/app/example/registry/modules/private/example/bedrock/aws
  topics:
    - aws-bedrock
  sections: {}

# Decompose (plan 020 15a): the `serverless-compute` umbrella Topic is 1:1 with
# Lambda in the seed, so it splits out as the concrete Lambda Resource. The
# umbrella demotes to a facet label (`topics: [serverless-compute]`) and keeps no
# own content page — old `/catalog/serverless-compute` 301s here.
- kind: service

# Atlas Resource projection records (plan 011, ADR-0013) — public-safe, fictional.
#
# Kind-first identity + Section Projection Plan ONLY: each Section maps to existing
# Source + Anchor references with an order, never to Section content. Atlas stores
# no resolved excerpts; the agent-facing /api/resources surface live-resolves these
# references per request. Section ids are drawn from the resource-kind registry
# vocabulary for the record's `kind`.

# service kind — complete vocabulary demonstrated on the pilot service.
- kind: service
  slug: aws/textract
  provider: aws
  name: Amazon Textract
  aliases:
    - AWS Textract
    - Textract
    - Amazon Textract
  sections:
    # Private-connectivity prose from the approved Terraform module README.
    network:
      - source_id: textract-module-readme
        anchor_id: private-subnet-usage
        order: 10
    # Net-new wiring (plan 011 §3): the governed regional matrix, Textract row.
    availability:
      - source_id: availability-matrix
        anchor_id: availability-textract-row
        order: 10
    # The cited Terraform starter — a registered Source excerpt, never synthesized.
    examples:
      - source_id: textract-module-readme
        anchor_id: textract-terraform-starter
        order: 10

# guardrail kind — a non-service kind, proving the framework is per-kind extensible.
- kind: guardrail
  slug: s3-public-access
  name: S3 Public Access Guardrail
  aliases:
    - S3 public access
    - block public access
    - bucket public access
  sections:
    enforced-controls:
      - source_id: s3-policy-doc
        anchor_id: public-access
        order: 10
    # Deprecated allowance retained for migration — surfaces as available content
    # carrying a stale_source warning (the source is past its review window).
    exceptions:
      - source_id: legacy-s3-policy
        anchor_id: legacy-public-access
        order: 10
